services:
  - type: web
    name: mentalhealth-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mentalhealth-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: mentalhealth-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://mentalhealth-frontend.onrender.com
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini

  - type: web
    name: mentalhealth-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://mentalhealth-backend.onrender.com

databases:
  - name: mentalhealth-db
    databaseName: mentalhealth
    user: mentalhealth
